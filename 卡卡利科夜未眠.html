<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>卡卡利科夜未眠 · 胜率提升工具</title>
<style>
:root{
  --bg:#14100c;
  --bg2:#1d1712;
  --ink:#2a211a;
  --parch:#ede0c4;
  --parch2:#e2d2ad;
  --parch-edge:#c9b487;
  --blood:#9a2230;
  --blood2:#c23142;
  --gold:#c9a24b;
  --good:#3b6ea5;
  --good-bg:#dbe6f0;
  --outsider:#2f8f7f;
  --outsider-bg:#d6ece6;
  --minion:#c47a1e;
  --minion-bg:#f2e2c4;
  --demon:#a8253a;
  --demon-bg:#f0d6d6;
  --muted:#7a6a52;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  background:
    radial-gradient(circle at 50% -10%, #2a201688 0%, transparent 55%),
    linear-gradient(180deg,#14100c 0%, #0e0b08 100%);
  background-attachment:fixed;
  color:var(--parch);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  min-height:100vh;
  line-height:1.6;
  padding-bottom:90px;
}
/* ---------- Header ---------- */
header{
  text-align:center;
  padding:22px 16px 12px;
}
header .moon{font-size:30px;filter:drop-shadow(0 0 8px #c9a24b66)}
header h1{
  margin:4px 0 2px;
  font-size:24px;
  letter-spacing:2px;
  color:var(--parch);
  text-shadow:0 2px 0 #000a, 0 0 18px #9a223044;
  font-weight:800;
}
header .sub{
  font-size:12.5px;color:var(--gold);letter-spacing:1px;margin-top:2px;
}
header .tag-line{font-size:11px;color:var(--muted);margin-top:6px}

/* ---------- Tabs ---------- */
.tabs{
  position:sticky;top:0;z-index:50;
  display:flex;gap:6px;
  padding:10px 10px;
  background:linear-gradient(180deg,#14100ce6,#14100cc0);
  backdrop-filter:blur(8px);
  overflow-x:auto;
  border-bottom:1px solid #3a2c1c;
  scrollbar-width:none;
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex:0 0 auto;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:8px 13px;border-radius:11px;
  background:#241c14;border:1px solid #3a2c1c;
  color:#b6a584;
  font-size:13px;font-weight:600;cursor:pointer;
  transition:.15s;white-space:nowrap;
}
.tab .ico{font-size:17px;line-height:1}
.tab.active{
  background:linear-gradient(180deg,var(--blood2),var(--blood));
  color:#fff;border-color:var(--blood2);
  box-shadow:0 3px 14px #9a223066;
}
.panel{display:none;padding:16px 14px 30px;max-width:680px;margin:0 auto;animation:fade .25s}
.panel.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ---------- Generic parchment card ---------- */
.card{
  background:
    linear-gradient(180deg,var(--parch) 0%, var(--parch2) 100%);
  color:var(--ink);
  border-radius:14px;
  padding:15px 16px;
  margin:13px 0;
  box-shadow:0 6px 18px #0008, inset 0 0 0 1px #fff6, inset 0 0 40px #00000010;
  border:1px solid var(--parch-edge);
  position:relative;
}
.card::after{
  content:"";position:absolute;inset:5px;border:1px solid #00000014;border-radius:10px;pointer-events:none;
}
.hint{font-size:12.5px;color:#c9b487;text-align:center;margin:2px 0 14px;line-height:1.7}
.section-title{
  font-size:13px;letter-spacing:2px;color:var(--gold);
  text-align:center;margin:18px 0 6px;font-weight:700;
}
.section-title::before,.section-title::after{content:"◆";opacity:.5;margin:0 8px;font-size:9px;vertical-align:middle}

/* ---------- Pills / selectors ---------- */
.pill-row{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin:8px 0}
.pill{
  padding:6px 13px;border-radius:20px;cursor:pointer;font-size:13px;font-weight:600;
  background:#241c14;border:1px solid #4a3a26;color:#cdbb95;transition:.13s;
}
.pill.active{background:var(--gold);color:#241c14;border-color:var(--gold);box-shadow:0 2px 10px #c9a24b55}
.pill.small{font-size:12px;padding:5px 11px}

/* faction filter colors when active */
.pill[data-fac="townsfolk"].active{background:var(--good);border-color:var(--good);color:#fff;box-shadow:0 2px 10px #3b6ea566}
.pill[data-fac="outsider"].active{background:var(--outsider);border-color:var(--outsider);color:#fff;box-shadow:0 2px 10px #2f8f7f66}
.pill[data-fac="minion"].active{background:var(--minion);border-color:var(--minion);color:#fff;box-shadow:0 2px 10px #c47a1e66}
.pill[data-fac="demon"].active{background:var(--demon);border-color:var(--demon);color:#fff;box-shadow:0 2px 10px #a8253a66}

/* ---------- char grid ---------- */
.fac-group{margin:10px 0}
.fac-head{font-size:12px;font-weight:700;letter-spacing:1px;margin:12px 0 6px;display:flex;align-items:center;gap:6px}
.fac-dot{width:9px;height:9px;border-radius:50%;display:inline-block}
.char-grid{display:flex;flex-wrap:wrap;gap:7px}
.char-btn{
  padding:7px 11px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;
  border:1px solid;transition:.12s;background:#221a12;
}
.char-btn .star{font-size:9px;opacity:.85;margin-left:3px}
.cb-townsfolk{color:#9cc1e6;border-color:#34516e}
.cb-outsider{color:#8fd9c9;border-color:#2f6b60}
.cb-minion{color:#e6b96f;border-color:#7a5526}
.cb-demon{color:#e89aa6;border-color:#7a2535}
.char-btn.active.cb-townsfolk{background:var(--good);color:#fff;border-color:var(--good)}
.char-btn.active.cb-outsider{background:var(--outsider);color:#fff;border-color:var(--outsider)}
.char-btn.active.cb-minion{background:var(--minion);color:#fff;border-color:var(--minion)}
.char-btn.active.cb-demon{background:var(--demon);color:#fff;border-color:var(--demon)}

/* ---------- Detail card ---------- */
.detail-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-wrap:wrap}
.detail-name{font-size:21px;font-weight:800;color:var(--ink);letter-spacing:1px}
.fac-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;color:#fff;white-space:nowrap}
.fb-townsfolk{background:var(--good)} .fb-outsider{background:var(--outsider)}
.fb-minion{background:var(--minion)} .fb-demon{background:var(--demon)}
.tagline{font-size:13px;color:#6b5a44;font-style:italic;margin:4px 0 2px}
.divider{height:1px;background:linear-gradient(90deg,transparent,#b39a6a,transparent);margin:11px 0}
.field{margin:9px 0}
.field .lab{font-size:12px;font-weight:800;color:var(--blood);letter-spacing:.5px;display:flex;align-items:center;gap:5px}
.field .val{font-size:14px;color:#33291f;margin-top:2px}
.partners{display:flex;flex-wrap:wrap;gap:5px;margin-top:3px}
.ptag{font-size:11.5px;background:#d8c49a;color:#4a3a1f;padding:2px 8px;border-radius:12px;border:1px solid #bda472}
.oneliner{
  margin-top:12px;padding:11px 13px;border-radius:10px;
  background:linear-gradient(135deg,#2a211a,#3a2c1c);
  color:#f0e2c2;font-size:13.5px;font-weight:600;line-height:1.65;
  border-left:4px solid var(--gold);
}
.oneliner .star{color:var(--gold);margin-right:5px}
.empty-state{text-align:center;color:#9a8a6a;padding:30px 10px;font-size:14px}
.empty-state .big{font-size:34px;display:block;margin-bottom:8px;opacity:.6}

/* config strip */
.config-strip{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:10px}
.cfg{padding:6px 10px;border-radius:9px;font-size:12px;font-weight:700;text-align:center;min-width:62px;border:1px solid}
.cfg .n{font-size:17px;display:block}
.cfg-t{background:var(--good-bg);color:#26486b;border-color:#a9c4dd}
.cfg-o{background:var(--outsider-bg);color:#1d5a4f;border-color:#9fcabf}
.cfg-m{background:var(--minion-bg);color:#7a5012;border-color:#d8bd8a}
.cfg-d{background:var(--demon-bg);color:#8a1c2c;border-color:#dba9af}

/* ---------- situation / combo numbered lists ---------- */
.rank-list{counter-reset:r;margin:4px 0 0;padding:0;list-style:none}
.rank-list li{
  position:relative;padding:6px 6px 6px 30px;font-size:13.5px;color:#33291f;
  border-bottom:1px dashed #c4ad7e;
}
.rank-list li:last-child{border-bottom:none}
.rank-list li::before{
  counter-increment:r;content:counter(r);
  position:absolute;left:2px;top:6px;width:20px;height:20px;border-radius:50%;
  background:var(--blood);color:#fff;font-size:11px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
}
.box{border-radius:10px;padding:10px 12px;margin:8px 0;font-size:13.5px;line-height:1.6}
.box .bl{font-size:12px;font-weight:800;letter-spacing:.5px;display:block;margin-bottom:3px}
.box-ask{background:#dbe6f0;color:#244a6b;border-left:4px solid var(--good)}
.box-dont{background:#f4dcdc;color:#8a2230;border-left:4px solid var(--demon)}
.box-suspect{background:#f2e2c4;color:#7a5012;border-left:4px solid var(--minion)}
.box-verify{background:#d6ece6;color:#1d5a4f;border-left:4px solid var(--outsider)}
.box-threat{background:#f4dcdc;color:#8a2230;border-left:4px solid var(--demon)}
.box-signal{background:#f2e2c4;color:#7a5012;border-left:4px solid var(--minion)}
.box-good{background:#dbe6f0;color:#244a6b;border-left:4px solid var(--good)}
.box-evil{background:#e9dcc4;color:#5a4424;border-left:4px solid #6b4a26}
.box-misjudge{background:#e6dccb;color:#5a4a30;border-left:4px solid var(--muted)}
.combo-title{font-size:18px;font-weight:800;color:var(--ink);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.combo-tier{font-size:10.5px;font-weight:800;padding:2px 8px;border-radius:6px;background:var(--blood);color:#fff}

/* ---------- decision helper ---------- */
.q-card{margin:11px 0}
.q-label{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:6px;display:flex;gap:7px;align-items:center}
.q-num{width:22px;height:22px;border-radius:50%;background:var(--ink);color:var(--parch);font-size:12px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.opt-row{display:flex;gap:7px;flex-wrap:wrap}
.opt{padding:7px 15px;border-radius:9px;border:1.5px solid #b8a067;background:#e7d8b6;color:#5a4628;font-size:13.5px;font-weight:600;cursor:pointer;transition:.12s}
.opt.active{background:var(--ink);color:var(--parch);border-color:var(--ink)}
.gen-btn{
  display:block;width:100%;margin:18px 0 6px;padding:14px;border:none;border-radius:12px;cursor:pointer;
  background:linear-gradient(180deg,var(--blood2),var(--blood));color:#fff;font-size:16px;font-weight:800;letter-spacing:2px;
  box-shadow:0 6px 18px #9a223055;
}
.gen-btn:active{transform:translateY(1px)}
.result-title{font-size:16px;font-weight:800;color:var(--gold);text-align:center;margin:6px 0 2px;letter-spacing:1px}

/* ---------- night order ---------- */
.toggle-row{display:flex;gap:8px;justify-content:center;margin:6px 0 14px}
.toggle-btn{flex:1;max-width:160px;padding:11px;border-radius:11px;border:1px solid #4a3a26;background:#241c14;color:#cdbb95;font-size:14px;font-weight:700;cursor:pointer;transition:.13s}
.toggle-btn.active{background:linear-gradient(180deg,var(--blood2),var(--blood));color:#fff;border-color:var(--blood2)}
.night-step{
  display:flex;align-items:center;gap:11px;margin:7px 0;padding:11px 13px;border-radius:11px;cursor:pointer;
  background:linear-gradient(180deg,var(--parch),var(--parch2));color:var(--ink);
  border:1px solid var(--parch-edge);transition:.13s;box-shadow:0 3px 9px #0006;
}
.night-step:active{transform:scale(.99)}
.step-num{width:26px;height:26px;border-radius:50%;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;background:var(--ink);color:var(--parch)}
.step-name{font-size:15px;font-weight:700;flex:1}
.step-fac{font-size:10px;padding:2px 7px;border-radius:10px;color:#fff;font-weight:700}
.step-arrow{color:#9a8a6a;font-size:13px;transition:.2s}
.night-step.open .step-arrow{transform:rotate(90deg)}
.step-tip{
  max-height:0;overflow:hidden;transition:max-height .25s ease;
  font-size:13.5px;color:#3a2c1c;
}
.step-tip-inner{padding:2px 4px 4px 37px}
.night-step.open .step-tip{max-height:240px}
.night-step.special{background:linear-gradient(180deg,#2a211a,#1d1712);color:var(--parch);border-color:#4a3a26}
.night-step.special .step-name{color:var(--gold)}
.night-step.special .step-num{background:var(--gold);color:#241c14}
.night-step.special .step-tip{color:#d8c8a8}

footer{text-align:center;font-size:11px;color:#5a4a36;padding:10px 16px 30px;line-height:1.7}
</style>
</head>
<body>

<header>
  <div class="moon">🌙</div>
  <h1>卡卡利科夜未眠</h1>
  <div class="sub">血染钟楼自制剧本 · 实战胜率提升工具</div>
  <div class="tag-line">30 秒，给你一个更高胜率的行动建议</div>
</header>

<nav class="tabs" id="tabs">
  <div class="tab active" data-tab="role"><span class="ico">🎭</span>我的角色</div>
  <div class="tab" data-tab="situation"><span class="ico">🔍</span>当前局势</div>
  <div class="tab" data-tab="combo"><span class="ico">⚔️</span>组合反制</div>
  <div class="tab" data-tab="today"><span class="ico">🎯</span>今天怎么打</div>
  <div class="tab" data-tab="night"><span class="ico">🌃</span>夜晚顺序</div>
</nav>

<!-- ============ TAB 1: 我的角色 ============ -->
<section class="panel active" id="tab-role">
  <div class="hint">先选人数看配置，再选你的角色，拿到这局的实战打法卡</div>

  <div class="section-title">本局人数</div>
  <div class="pill-row" id="countRow"></div>
  <div class="config-strip" id="configStrip"></div>

  <div class="section-title">选择你的角色</div>
  <div id="charPicker"></div>

  <div id="roleDetail">
    <div class="card"><div class="empty-state"><span class="big">🎴</span>选一个角色，查看它的实战打法卡</div></div>
  </div>
</section>

<!-- ============ TAB 2: 当前局势 ============ -->
<section class="panel" id="tab-situation">
  <div class="hint">选当前发生的局势，立刻拿到判断优先级和行动建议</div>
  <div class="pill-row" id="sitRow"></div>
  <div id="sitDetail">
    <div class="card"><div class="empty-state"><span class="big">🔎</span>选一个局势标签</div></div>
  </div>
</section>

<!-- ============ TAB 3: 组合反制 ============ -->
<section class="panel" id="tab-combo">
  <div class="hint">只收录高胜率核心邪恶组合 · 怎么识别、怎么反制</div>
  <div class="pill-row" id="comboRow"></div>
  <div id="comboDetail">
    <div class="card"><div class="empty-state"><span class="big">⚔️</span>选一个邪恶组合</div></div>
  </div>
</section>

<!-- ============ TAB 4: 今天怎么打 ============ -->
<section class="panel" id="tab-today">
  <div class="hint">回答几个问题，生成今日决策建议</div>
  <div id="questionList"></div>
  <button class="gen-btn" id="genBtn">⚡ 生成今日建议</button>
  <div id="todayResult"></div>
</section>

<!-- ============ TAB 5: 夜晚顺序 ============ -->
<section class="panel" id="tab-night">
  <div class="hint">点击每个步骤，展开一句实战提醒</div>
  <div class="toggle-row">
    <button class="toggle-btn active" data-night="first">🌑 首个夜晚</button>
    <button class="toggle-btn" data-night="other">🌙 其他夜晚</button>
  </div>
  <div id="nightList"></div>
</section>

<footer>
  剧本《卡卡利科夜未眠》 作者：海伦娜 &amp; 纾 · 本工具仅为实战辅助<br>
  数据可在 JS 内的对象数组中自由增改
</footer>

<script>

function buildTodayAdvice(a){
  const mech=[],dont=[],ask=[];
  let kill=[],protect=[];
  const push=(arr,...xs)=>xs.forEach(x=>{if(!arr.includes(x))arr.push(x)});

    push(mech,'常规恶魔单刀（但单死不一定是小恶魔）');

  }else if(a.deaths==='2'){
    push(mech,'裁决使杀爪牙额外行动 / 桑尼猜错 / 狩猎天狼 / 亚历克斯 / 军火商引爆 / 裁缝公布藏死');
    push(dont,'不要只盘裁决使，多死来源很多');
    push(ask,'执笔人问“昨夜是否有爪牙被恶魔杀死”');
    push(kill,'若多死含暴露爪牙→疑似裁决使线');
    push(protect,'剩余信息位');
  }
  if(a.mismatch==='y'){
    push(mech,'机械姬偷能力原主中毒 / 酒鬼 / 慧眼识珠 / 莫奈 / 易容师');
    push(dont,'不要一错就处决信息位；不要因信息准确就默认善良');
    push(ask,'执笔人验证“机械姬是否获得了某能力”，伊文拆不在场角色');
    push(kill,'先排除机械姬/酒鬼再决定（谨慎）');
    push(protect,'可能被机械姬毒的真信息位');
  }
  if(a.force==='y'){
    push(mech,'狂犬病患者逼提名 / 师郎施压');
    push(dont,'不要因为突然提名就打死好人');
    push(ask,'执笔人验证“某人是否被狂犬病患者影响”');
    push(kill,'狂犬病患者本体，而非被逼提名的人');
    push(protect,'被迫提名的好人');
  }
  if(a.outsider==='y'){
    push(mech,'方古找外来者转生 / 外来者数量争议（机械姬-1 树先生+1 方古+1）');
    push(dont,'不要全场公开外来者名单帮方古找目标');
    push(ask,'核对外来者数量是否对得上');
    push(kill,'谨慎，别误处决独立的亚历克斯');
    push(protect,'外来者（防方古转生）');
  }
  if(a.tailor==='y'){
    push(mech,'裁缝藏死，存活人数失真');
    push(dont,'不要信表面存活人数判断胜利临界点');
    push(ask,'执笔人问“是否存在被隐藏死亡玩家”');
    push(kill,'疑似裁缝（裁缝死会公布所有藏死）');
    push(protect,'—');
  }
  if(a.shichiro==='y'){
    push(mech,'师郎明牌邪恶不死于处决，可能是冢中枯骨复活保险');
    push(dont,'不要把处决浪费在师郎身上，不要被他消耗白天时间');
    push(ask,'记录谁被要求谄媚师郎（其行为可能被迫异常）');
    push(kill,'其他爪牙/恶魔，不是师郎');
    push(protect,'被师郎绑定、行为被迫异常的好人');
  }
  if(a.swap==='y'){
    push(mech,'冢中枯骨复活 / 方古转生 / 小恶魔传魔');
    push(dont,'不要以为恶魔已死就松懈');
    push(ask,'执笔人验证“方古是否已转生”“小恶魔是否传魔”');
    push(kill,'存活爪牙（断冢中枯骨复活）、突然变安全的外来者');
    push(protect,'—');
  }

  if(!mech.length){
    push(mech,'信息尚不明朗，按常规节奏推进');
    push(dont,'前期不要把强身份全公开');
    push(ask,'建立身份声称表 / 夜死表 / 提名投票表 / 目标行动表');
    push(kill,'暂无明确目标，优先信息交叉验证');
    push(protect,'核心信息位（私家侦探、战略专家、树先生）');
  }
  protect=protect.filter(x=>x!=='—'); kill=kill.filter(x=>x!=='—');
  if(!protect.length)protect.push('暂无特别需保护目标');
  if(!kill.length)kill.push('暂无明确处决目标，先收集信息');
  return {mech,dont,ask,kill,protect};
}

const $=s=>document.querySelector(s);
const $$=s=>document.querySelectorAll(s);
const el=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};

/* ---- Tabs ---- */
$$('.tab').forEach(t=>t.addEventListener('click',()=>{
  $$('.tab').forEach(x=>x.classList.remove('active'));
  $$('.panel').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  $('#tab-'+t.dataset.tab).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}));

/* ---- TAB1 人数 + 角色 ---- */
let selectedCount=10;
function renderCount(){
  const row=$('#countRow'); row.innerHTML='';
  for(let c=7;c<=15;c++){
    const p=el('div','pill small'+(c===selectedCount?' active':''),c+'人');
    p.onclick=()=>{selectedCount=c;renderCount();renderConfig();};
    row.appendChild(p);
  }
}
function renderConfig(){
  const [t,o,m,d]=CONFIG[selectedCount];
  const strip=$('#configStrip');
  strip.innerHTML='';
  const data=[['镇民',t,'cfg-t'],['外来者',o,'cfg-o'],['爪牙',m,'cfg-m'],['恶魔',d,'cfg-d']];
  data.forEach(([lab,n,cls])=>{
    strip.appendChild(el('div','cfg '+cls,'<span class="n">'+n+'</span>'+lab));
  });
  strip.appendChild(el('div','cfg','<span class="n" style="color:#c9a24b">±</span><span style="color:#9a8a6a;font-size:11px">角色能力<br>可±外来者</span>'));
}

let selectedChar=null;
function renderCharPicker(){
  const wrap=$('#charPicker'); wrap.innerHTML='';
  const order=['townsfolk','outsider','minion','demon'];
  order.forEach(fk=>{
    const f=FAC[fk];
    const g=el('div','fac-group');
    g.appendChild(el('div','fac-head',
      '<span class="fac-dot" style="background:'+f.dot+'"></span>'+f.label));
    const grid=el('div','char-grid');
    CHARACTERS.filter(c=>c.fac===fk).forEach(c=>{
      const b=el('div','char-btn cb-'+fk+(selectedChar===c?' active':''),
        c.name+(c.key?'<span class="star">★</span>':''));
      b.onclick=()=>{selectedChar=c;renderCharPicker();renderRoleDetail();
        $('#roleDetail').scrollIntoView({behavior:'smooth',block:'start'});};
      grid.appendChild(b);
    });
    g.appendChild(grid);
    wrap.appendChild(g);
  });
}
function renderRoleDetail(){
  const box=$('#roleDetail');
  if(!selectedChar){box.innerHTML='';return;}
  const c=selectedChar,f=FAC[c.fac];
  const partners=c.partners.map(p=>'<span class="ptag">'+p+'</span>').join('');
  box.innerHTML='';
  const card=el('div','card');
  card.innerHTML=
    '<div class="detail-head"><div class="detail-name">'+c.name+
      (c.key?' <span style="color:#c9a24b;font-size:14px">★重点</span>':'')+
      '</div><span class="fac-badge fb-'+c.fac+'">'+f.label+'</span></div>'+
    '<div class="tagline">'+c.tagline+'</div>'+
    '<div class="divider"></div>'+
    field('🎯 核心任务',c.task)+
    field('👁 前期是否公开',c.reveal)+
    field('📢 信息公开 / 私聊',c.info)+
    field('🌙 首夜 / 每夜优先目标',c.night)+
    '<div class="field"><div class="lab">🤝 最适合配合</div><div class="partners">'+partners+'</div></div>'+
    field('⚠️ 最怕的反制',c.fear)+
    field('❌ 常见错误',c.mistake)+
    '<div class="oneliner"><span class="star">★ 高胜率一句话</span>'+c.one+'</div>';
  box.appendChild(card);
}
function field(lab,val){
  return '<div class="field"><div class="lab">'+lab+'</div><div class="val">'+val+'</div></div>';
}

/* ---- TAB2 局势 ---- */
let selectedSit=null;
function renderSitRow(){
  const row=$('#sitRow'); row.innerHTML='';
  SITUATIONS.forEach((s,i)=>{
    const p=el('div','pill'+(selectedSit===i?' active':''),s.name);
    p.onclick=()=>{selectedSit=i;renderSitRow();renderSitDetail();};
    row.appendChild(p);
  });
}
function renderSitDetail(){
  const box=$('#sitDetail');
  if(selectedSit===null){box.innerHTML='';return;}
  const s=SITUATIONS[selectedSit];
  box.innerHTML='';
  const card=el('div','card');
  card.innerHTML=
    '<div class="combo-title">'+s.name+'</div>'+
    '<div class="section-title" style="margin:14px 0 4px">可能原因排序</div>'+
    '<ol class="rank-list">'+s.causes.map(x=>'<li>'+x+'</li>').join('')+'</ol>'+
    box2('box-ask','今天该问什么',s.ask)+
    box2('box-dont','今天不要做什么',s.dont)+
    box2('box-suspect','优先怀疑谁',s.suspect)+
    boxTags('box-verify','适合用哪些角色验证',s.verify);
  box.appendChild(card);
}
function box2(cls,lab,txt){return '<div class="box '+cls+'"><span class="bl">'+lab+'</span>'+txt+'</div>';}
function boxTags(cls,lab,arr){
  return '<div class="box '+cls+'"><span class="bl">'+lab+'</span><div class="partners">'+
    arr.map(x=>'<span class="ptag">'+x+'</span>').join('')+'</div></div>';
}

/* ---- TAB3 组合 ---- */
let selectedCombo=null;
function renderComboRow(){
  const row=$('#comboRow'); row.innerHTML='';
  COMBOS.forEach((c,i)=>{
    const p=el('div','pill'+(selectedCombo===i?' active':''),c.name);
    p.onclick=()=>{selectedCombo=i;renderComboRow();renderComboDetail();};
    row.appendChild(p);
  });
}
function renderComboDetail(){
  const box=$('#comboDetail');
  if(selectedCombo===null){box.innerHTML='';return;}
  const c=COMBOS[selectedCombo];
  box.innerHTML='';
  const card=el('div','card');
  card.innerHTML=
    '<div class="combo-title">'+c.name+' <span class="combo-tier">'+c.tier+'</span></div>'+
    box2('box-threat','威胁点',c.threat)+
    box2('box-signal','识别信号',c.signal)+
    box2('box-good','善良方反制',c.good)+
    box2('box-evil','邪恶方使用技巧',c.evil)+
    box2('box-misjudge','常见误判',c.misjudge);
  box.appendChild(card);
}

/* ---- TAB4 今天怎么打 ---- */
const answers={};
function renderQuestions(){
  const list=$('#questionList'); list.innerHTML='';
  QUESTIONS.forEach((q,i)=>{
    const card=el('div','card q-card');
    card.appendChild(el('div','q-label','<span class="q-num">'+(i+1)+'</span>'+q.label));
    const row=el('div','opt-row');
    q.opts.forEach(o=>{
      const b=el('div','opt'+(answers[q.id]===o.v?' active':''),o.t);
      b.onclick=()=>{
        answers[q.id]=(answers[q.id]===o.v?undefined:o.v);
        renderQuestions();
      };
      row.appendChild(b);
    });
    card.appendChild(row);
    list.appendChild(card);
  });
}
$('#genBtn').onclick=()=>{
  const r=buildTodayAdvice(answers);
  const box=$('#todayResult');
  box.innerHTML='';
  const card=el('div','card');
  card.innerHTML=
    '<div class="result-title">⚡ 今日行动建议</div>'+
    '<div class="divider"></div>'+
    boxList('box-suspect','🧩 今天优先怀疑的机制',r.mech)+
    boxList('box-dont','🚫 今天不该做的事',r.dont)+
    boxList('box-ask','❓ 今天应该问的问题',r.ask)+
    boxList('box-threat','🗡 今天适合处决的目标类型',r.kill)+
    boxList('box-good','🛡 今天应该保护的目标类型',r.protect);
  box.appendChild(card);
  box.scrollIntoView({behavior:'smooth',block:'start'});
};
function boxList(cls,lab,arr){
  return '<div class="box '+cls+'"><span class="bl">'+lab+'</span>'+
    arr.map(x=>'• '+x).join('<br>')+'</div>';
}

/* ---- TAB5 夜晚顺序 ---- */
let nightMode='first';
const facLabel={townsfolk:['镇民','#3b6ea5'],outsider:['外来者','#2f8f7f'],minion:['爪牙','#c47a1e'],demon:['恶魔','#a8253a'],special:['流程','#7a6a52']};
function renderNight(){
  const list=$('#nightList'); list.innerHTML='';
  const data=nightMode==='first'?NIGHT_FIRST:NIGHT_OTHER;
  data.forEach((s,i)=>{
    const [flab,fcol]=facLabel[s.fac];
    const step=el('div','night-step'+(s.fac==='special'?' special':''));
    step.innerHTML=
      '<div class="step-num">'+(i+1)+'</div>'+
      '<div style="flex:1">'+
        '<div class="step-name">'+s.n+'</div>'+
        '<div class="step-tip"><div class="step-tip-inner" style="padding-left:0">'+s.tip+'</div></div>'+
      '</div>'+
      '<span class="step-fac" style="background:'+fcol+'">'+flab+'</span>'+
      '<span class="step-arrow">▶</span>';
    step.onclick=()=>step.classList.toggle('open');
    list.appendChild(step);
  });
}
$$('.toggle-btn').forEach(b=>b.onclick=()=>{
  $$('.toggle-btn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  nightMode=b.dataset.night;
  renderNight();
});

/* ---- init ---- */
renderCount();renderConfig();renderCharPicker();
renderSitRow();renderComboRow();renderQuestions();renderNight();
</script>
</body>
</html>
